name: Postinstall Platform Checks

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.gitattributes'
      - '.github/workflows/postinstall-platform.yml'
      - 'bin/postinstall.ts'
      - 'src/core/claude-install.ts'
      - 'src/core/cli-detect.ts'
      - 'src/core/runtime-path.ts'
      - 'scripts/install-risk-gate.mjs'
      - 'scripts/install.sh'
      - 'scripts/install-wsl.sh'
      - 'scripts/install-officecli.ps1'
      - 'scripts/fresh-install-smoke.ts'
      - 'scripts/verify-fresh-install.sh'
      - 'scripts/collect-fresh-install-evidence.sh'
      - 'scripts/audit-fresh-install-evidence.mjs'
      - 'scripts/verify-release-evidence.mjs'
      - 'scripts/require-release-evidence.mjs'
      - 'tests/unit/cli-detect.test.ts'
      - 'tests/unit/install-sh-exec.test.ts'
      - 'tests/unit/fresh-evidence-audit.test.ts'
      - 'tests/unit/safe-install.test.ts'
      - 'tests/unit/service.test.ts'
      - 'tests/unit/postinstall-strict-tools.test.ts'
      - 'tests/unit/wsl-installer-doctor.test.ts'
      - 'tests/unit/wsl-installer-exec.test.ts'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - '.gitattributes'
      - '.github/workflows/postinstall-platform.yml'
      - 'bin/postinstall.ts'
      - 'src/core/claude-install.ts'
      - 'src/core/cli-detect.ts'
      - 'src/core/runtime-path.ts'
      - 'scripts/install-risk-gate.mjs'
      - 'scripts/install.sh'
      - 'scripts/install-wsl.sh'
      - 'scripts/install-officecli.ps1'
      - 'scripts/fresh-install-smoke.ts'
      - 'scripts/verify-fresh-install.sh'
      - 'scripts/collect-fresh-install-evidence.sh'
      - 'scripts/audit-fresh-install-evidence.mjs'
      - 'scripts/verify-release-evidence.mjs'
      - 'scripts/require-release-evidence.mjs'
      - 'tests/unit/cli-detect.test.ts'
      - 'tests/unit/install-sh-exec.test.ts'
      - 'tests/unit/fresh-evidence-audit.test.ts'
      - 'tests/unit/safe-install.test.ts'
      - 'tests/unit/service.test.ts'
      - 'tests/unit/postinstall-strict-tools.test.ts'
      - 'tests/unit/wsl-installer-doctor.test.ts'
      - 'tests/unit/wsl-installer-exec.test.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postinstall-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux postinstall policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Run postinstall policy tests
        run: npx tsx --import ./tests/setup/test-home.ts --experimental-test-module-mocks --test tests/unit/cli-detect.test.ts tests/unit/safe-install.test.ts

  macos-installer-risk:
    name: macOS installer risk gate
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run installer risk gate
        run: npm run test:install-risk

      - name: Build package
        run: npm run build

      - name: Smoke packaged global install
        run: npm run test:fresh-install -- --postinstall --skip-doctor

  windows-wsl:
    name: Windows WSL postinstall policy
    runs-on: windows-2022
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup WSL
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          use-cache: 'false'
          additional-packages: curl ca-certificates gnupg

      - name: Install Node.js in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version

      - name: Install dependencies in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          cd "$(wslpath '${{ github.workspace }}')"
          npm ci --ignore-scripts

      - name: Type check in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          cd "$(wslpath '${{ github.workspace }}')"
          npx tsc --noEmit

      - name: Run installer risk gate in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          cd "$(wslpath '${{ github.workspace }}')"
          npm run test:install-risk

      - name: Build package in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          cd "$(wslpath '${{ github.workspace }}')"
          npm run build

      - name: Smoke packaged global install in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          cd "$(wslpath '${{ github.workspace }}')"
          npm run test:fresh-install -- --postinstall --skip-doctor

      - name: Smoke PowerShell to WSL login shell
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $workspaceForWsl = $workspace -replace '\\', '/'
          $linuxWorkspace = (wsl.exe -d Ubuntu-24.04 -- wslpath "$workspaceForWsl").Trim()
          if (-not $linuxWorkspace) { throw "wslpath returned an empty workspace path" }
          wsl.exe -d Ubuntu-24.04 -- bash -lc "cd '$linuxWorkspace' && npm run test:fresh-install -- --postinstall --skip-doctor"
